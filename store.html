<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store - KewerSMP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: radial-gradient(circle at center, #0b1f4b 0%, #040712 75%);
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  border-bottom: 1px solid rgba(59,130,246,0.3);
  background: rgba(5,10,25,0.5);
  backdrop-filter: blur(10px);
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 20px;
}

/* CARD TRANSPARAN */
.card {
  margin: 25px auto;
  max-width: 350px;
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(6px);
  border-radius: 15px;
}

/* LOGO */
.rank-logo {
  width: 50px;
  height: 50px;
  margin-bottom: 10px;
  filter: brightness(0) invert(1); /* jadi putih dari hitam */
}

/* BADGE */
.badge {
  font-size: 12px;
  color: #60a5fa;
  margin-top: 5px;
}

/* PRICE BUTTON */
.price {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(59,130,246,0.2);
  border: 1px solid rgba(59,130,246,0.4);
  color: #60a5fa;
  text-decoration: none;
  display: block;
}

/* SEE FEATURE */
.toggle {
  margin-top: 10px;
  color: #9ca3af;
  cursor: pointer;
  font-size: 14px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(10,20,45,0.95);
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 300px;
  text-align: center;
}

.modal ul {
  text-align: left;
}

.close {
  margin-top: 10px;
  color: #60a5fa;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>Kewer<span style="color:#3b82f6;">SMP</span></div>
  <div><a href="index.html" style="color:white;">🏠</a></div>
</div>

<div class="container">

<h1>STORE</h1>

<!-- VIP -->
<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="rank-logo">
<h2>VIP</h2>
<div class="badge">Trial 30 Hari</div>

<div class="toggle" onclick="openModal('VIP', [
'3x Limit Claim',
'6000 Limit Block',
'5× sethome',
'premium daily reward',
'/feed',
'/nick'
])">See Features</div>

<a href="https://wa.me/6289673735976?text=Halo%20Admin%20KewerSMP,%20saya%20tertarik%20untuk%20membeli%20Rank%20VIP%20seharga%20Rp%2015.000.%20Bagaimana%20cara%20pembayarannya?" class="price">Rp15.000</a>
</div>

<!-- PRO -->
<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135673.png" class="rank-logo">
<h2>PRO</h2>
<div class="badge">Trial 30 Hari</div>

<div class="toggle" onclick="openModal('PRO', [
'8x Limit Claim',
'8000 Limit Block',
'10× sethome',
'/heal',
'/repair'
])">See Features</div>

<a href="https://wa.me/6289673735976?text=Halo%20Admin%20KewerSMP,%20saya%20tertarik%20untuk%20membeli%20Rank%20PRO%20seharga%20Rp%2025.000.%20Bagaimana%20cara%20pembayarannya?" class="price">Rp25.000</a>
</div>

<!-- MASTER -->
<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/190/190406.png" class="rank-logo">
<h2>MASTER</h2>
<div class="badge">Permanent</div>

<div class="toggle" onclick="openModal('MASTER', [
'Unlimited Claim',
'50× sethome',
'/ptime',
'/tp'
])">See Features</div>

<a href="https://wa.me/6289673735976?text=Halo%20Admin%20KewerSMP,%20saya%20tertarik%20untuk%20membeli%20Rank%20MASTER%20seharga%20Rp%20150.000.%20Bagaimana%20cara%20pembayarannya?" class="price">Rp150.000</a>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Rank Benefits</h2>
    <h3 id="modalTitle"></h3>
    <ul id="modalList"></ul>
    <div class="close" onclick="closeModal()">Tutup</div>
  </div>
</div>

<script>
function openModal(rank, features) {
  document.getElementById("modalTitle").innerText = rank;

  let list = document.getElementById("modalList");
  list.innerHTML = "";

  features.forEach(f => {
    let li = document.createElement("li");
    li.innerText = f;
    list.appendChild(li);
  });

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
