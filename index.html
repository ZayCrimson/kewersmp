<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KewerSMP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  background: radial-gradient(circle at center, #0b1f4b 0%, #040712 75%);
  overflow-x: hidden;
}

/* GRID */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -3;
}

/* GLOW */
body::after {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.7), transparent 70%);
  filter: blur(140px);
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  z-index: -2;
}

/* NAVBAR (FIX SAMAIN DENGAN STORE) */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  border-bottom: 1px solid rgba(59,130,246,0.4);
  background: rgba(5,10,25,0.7);
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(59,130,246,0.6),
              0 0 25px rgba(59,130,246,0.4);
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 36px;
  text-shadow: 0 0 30px rgba(59,130,246,0.9);
}

p {
  color: #9ca3af;
}

/* CARD */
.card {
  background: linear-gradient(145deg, rgba(10,20,45,0.95), rgba(5,8,20,0.95));
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 400px;
  border: 1px solid rgba(59,130,246,0.3);
  box-shadow: 0 0 30px rgba(59,130,246,0.3),
              inset 0 0 25px rgba(0,0,0,0.8);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 60px rgba(59,130,246,0.5);
}

/* STATUS */
.status {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 15px;
  background: rgba(10,20,45,0.9);
  border: 1px solid rgba(59,130,246,0.3);
  box-shadow:
    0 0 20px rgba(59,130,246,0.3),
    inset 0 0 20px rgba(0,0,0,0.7);
}

.dot {
  width: 10px;
  height: 10px;
  background: #22c55e;
  border-radius: 50%;
  box-shadow: 0 0 10px #22c55e;
}

/* BUTTON */
.btn {
  display: block;
  margin: 10px auto;
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 300px;
  font-weight: 600;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.vote { background: linear-gradient(45deg,#3b82f6,#60a5fa); }
.wa { background: #25D366; }
.dc { background: #5865F2; }
.tt { background: #000000; }

.btn:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 12px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<!-- NAVBAR (UPDATED ONLY HERE) -->
<div class="navbar">

  <div style="display:flex; align-items:center; gap:10px;">
    <img src="https://res.cloudinary.com/dyvfslvvh/image/upload/v1776409842/KewerSMP_SEASON_9__120363303029932613_g.us_20260417-140644_lkv37z.jpg"
    style="width:40px;height:40px;border-radius:10px;box-shadow:0 0 15px rgba(59,130,246,0.8);">

    <div style="
      font-weight:700;
      font-size:18px;
      color:#fff;
      text-shadow:0 0 10px rgba(59,130,246,0.8);
    ">
      Kewer<span style="color:#3b82f6;">SMP</span>
    </div>
  </div>

  <div>
    <a href="store.html" style="
      color:white;
      text-decoration:none;
      font-size:18px;
      background:rgba(59,130,246,0.2);
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(59,130,246,0.4);
    ">
      🛒
    </a>
  </div>

</div>

<div class="container">

<h1>WELCOME TO KewerSMP</h1>
<p>Jelajahi server survival economy dengan komunitas yang solid</p>

<div class="card" onclick="copyJava()">
  <h2>JAVA EDITION</h2>
  <p>kewersmp.fun</p>
  <small>Tap untuk copy IP</small>
</div>

<div class="card" onclick="copyBedrock()">
  <h2>BEDROCK EDITION</h2>
  <p>kewersmp.fun : 19132</p>
  <small>Tap untuk copy IP & Port</small>
</div>

<div class="status">
  <div class="dot"></div>
  <span id="statusText">CHECKING...</span>
</div>

<a href="https://minecraft-mp.com/server/356237/vote/" class="btn vote">⭐ VOTE</a>
<a href="https://chat.whatsapp.com/GXGocvwkO3I1cktvxT7nxT?mode=gi_t" class="btn wa">📱 WHATSAPP</a>
<a href="https://discord.gg/mYxE2FFpX" class="btn dc">💬 DISCORD</a>
<a href="https://www.tiktok.com/@kewersmp" class="btn tt">🎵 TIKTOK</a>

</div>

<div id="toast" class="toast">Copied!</div>

<script>
function showToast(text) {
  let t = document.getElementById("toast");
  t.innerText = text;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function copyJava() {
  navigator.clipboard.writeText("kewersmp.fun");
  showToast("IP Java berhasil di-copy!");
}

function copyBedrock() {
  navigator.clipboard.writeText("kewersmp.fun:19132");
  showToast("IP Bedrock berhasil di-copy!");
}

fetch("https://api.mcsrvstat.us/2/kewersmp.fun")
.then(res => res.json())
.then(data => {
  if (data.online) {
    document.getElementById("statusText").innerText =
      "SERVER ONLINE - " + data.players.online + " PEMAIN";
  } else {
    document.getElementById("statusText").innerText = "SERVER OFFLINE";
  }
});
</script>

</body>
</html>
